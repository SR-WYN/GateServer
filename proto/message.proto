syntax = "proto3";

package message;

service VerifyService {
  rpc GetVerifyCode (GetVerifyReq) returns (GetVerifyRsp) {}
}

message GetVerifyReq {
  string email = 1;
}

message GetVerifyRsp {
  int32 error = 1;
  string email = 2;
  string code = 3;
}

message GetChatServerReq {
  int32 uid = 1;
}

message GetChatServerRsp {
  int32 error = 1;
  string host = 2;
  string port = 3;
  string token = 4;
}

message LoginReq {
  int32 uid = 1;
  string token = 2;
}

message LoginRsp {
  int32 error = 1;
  int32 uid = 2;
  string token = 3;
}

message RegisterNodeReq {
  string name = 1;
  string client_host = 2;
  string client_port = 3;
  string rpc_host = 4;
  string rpc_port = 5;
  string instance_id = 6;
}

message RegisterNodeRsp {
  int32 error = 1;
  string name = 2;
}

message UnregisterNodeReq {
  string name = 1;
  string instance_id = 2;
}

message UnregisterNodeRsp {
  int32 error = 1;
}

message HeartbeatNodeReq {
  string name = 1;
  string instance_id = 2;
}

message HeartbeatNodeRsp {
  int32 error = 1;
}

message GetUserNodeReq {
  int32 uid = 1;
}

message GetUserNodeRsp {
  int32 error = 1;
  string node_name = 2;
  string rpc_host = 3;
  string rpc_port = 4;
  string client_host = 5;
  string client_port = 6;
}

message GetNodeReq {
  string name = 1;
}

message GetNodeRsp {
  int32 error = 1;
  string name = 2;
  string rpc_host = 3;
  string rpc_port = 4;
  string client_host = 5;
  string client_port = 6;
}

message BindUserToNodeReq {
  int32 uid = 1;
  string node_name = 2;
}

message BindUserToNodeRsp {
  int32 error = 1;
}

message UnbindUserReq {
  int32 uid = 1;
}

message UnbindUserRsp {
  int32 error = 1;
}

message ValidateTokenReq {
  int32 uid = 1;
  string token = 2;
}

message ValidateTokenRsp {
  int32 error = 1;
  int32 uid = 2;
}

message KickUserReq {
  int32 uid = 1;
  string reason = 2;
}

message KickUserRsp {
  int32 error = 1;
  int32 uid = 2;
}

message RefreshTokenTTLReq {
  int32 uid = 1;
}

message RefreshTokenTTLRsp {
  int32 error = 1;
}

message LogoutReq {
  int32 uid = 1;
}

message LogoutRsp {
  int32 error = 1;
}

// GateServer 通知服务（供 StatusServer 调用）
message UserOfflineReq {
  int32 uid = 1;
}

message UserOfflineRsp {
  int32 error = 1;
}

message UserOnlineReq {
  int32 uid = 1;
}

message UserOnlineRsp {
  int32 error = 1;
}

service GateNotifyService {
  rpc NotifyUserOffline(UserOfflineReq) returns (UserOfflineRsp);
  rpc NotifyUserOnline(UserOnlineReq) returns (UserOnlineRsp);
}

service StatusService {
  rpc GetChatServer (GetChatServerReq) returns (GetChatServerRsp);
  rpc Login(LoginReq) returns(LoginRsp);
  rpc RegisterNode(RegisterNodeReq) returns (RegisterNodeRsp);
  rpc UnregisterNode(UnregisterNodeReq) returns (UnregisterNodeRsp);
  rpc HeartbeatNode(HeartbeatNodeReq) returns (HeartbeatNodeRsp);
  rpc GetUserNode(GetUserNodeReq) returns (GetUserNodeRsp);
  rpc GetNode(GetNodeReq) returns (GetNodeRsp);
  rpc BindUserToNode(BindUserToNodeReq) returns (BindUserToNodeRsp);
  rpc UnbindUser(UnbindUserReq) returns (UnbindUserRsp);
  rpc ValidateToken(ValidateTokenReq) returns (ValidateTokenRsp);
  rpc RefreshTokenTTL(RefreshTokenTTLReq) returns (RefreshTokenTTLRsp);
  rpc Logout(LogoutReq) returns (LogoutRsp);
  rpc KickUser(KickUserReq) returns (KickUserRsp);
  rpc NotifyUserOnline(UserOnlineReq) returns (UserOnlineRsp);
}